<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Satify — Құпия сөзді қалпына келтіру</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="mobile.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2D2DFF; --blue-dark: #1a1aee; --blue-light: #f0f0ff;
      --text: #0a0a1a; --muted: #6b7280; --border: #e5e7eb; --white: #ffffff;
    }
    body {
      font-family: 'Sora', sans-serif;
      background: #f7f8ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .auth-card {
      background: var(--white);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 48px rgba(45,45,255,.10), 0 2px 12px rgba(0,0,0,.04);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 64px; height: 64px;
      background: var(--blue-light); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; color: var(--blue);
    }

    .auth-title {
      text-align: center; font-size: 1.5rem; font-weight: 700;
      color: var(--text); margin-bottom: 6px; letter-spacing: -.03em;
    }
    .auth-subtitle {
      text-align: center; font-size: .875rem;
      color: var(--muted); margin-bottom: 36px; line-height: 1.6;
    }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: .8125rem; font-weight: 600; color: var(--text); margin-bottom: 7px; }
    input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Sora', sans-serif; font-size: .9rem; color: var(--text);
      background: #fafafa; outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input:focus { border-color: var(--blue); background: var(--white); box-shadow: 0 0 0 4px rgba(45,45,255,.08); }
    input::placeholder { color: #b0b3c0; }

    .btn-primary {
      width: 100%; padding: 13px; background: var(--blue); color: var(--white);
      border: none; border-radius: 10px; font-family: 'Sora', sans-serif;
      font-size: .9375rem; font-weight: 600; cursor: pointer; margin-top: 8px;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-primary:hover { background: var(--blue-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,45,255,.25); }
    .btn-primary:active { transform: translateY(0); }

    .btn-back {
      width: 100%; padding: 12px; background: transparent;
      color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Sora', sans-serif; font-size: .875rem; font-weight: 500;
      cursor: pointer; margin-top: 12px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none; transition: border-color .2s, color .2s;
    }
    .btn-back:hover { border-color: var(--blue); color: var(--blue); }

    /* Success state */
    .success-state { display: none; text-align: center; }
    .success-state.active { display: block; animation: fadeUp .4s ease both; }
    .success-icon {
      width: 72px; height: 72px; background: #e8fdf0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; color: #22c55e;
    }
    .success-state h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .success-state p { font-size: .875rem; color: var(--muted); line-height: 1.6; }

    @media(max-width: 480px) { .auth-card { padding: 36px 24px; } }
  </style>
</head>

<body>
  <div class="auth-card">

    <!-- Form state -->
    <div id="form-state">
      <div class="icon-wrap">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 class="auth-title">Құпия сөзді ұмыттыңыз ба?</h1>
      <p class="auth-subtitle">Электрондық поштаңызды енгізіңіз — қалпына келтіру нұсқаулары жіберіледі</p>

      <form onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="email">Электрондық пошта</label>
          <input type="email" id="email" placeholder="email@example.com" required autocomplete="email"/>
        </div>
        <button class="btn-primary" type="submit">Сілтеме жіберу</button>
      </form>

      <a href="login.html" class="btn-back">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Кіруге оралу
      </a>
    </div>

    <!-- Success state -->
    <div class="success-state" id="success-state">
      <div class="success-icon">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2>Хат жіберілді!</h2>
      <p>Электрондық поштаңызды тексеріңіз — құпия сөзді қалпына келтіру нұсқаулары жіберілді.</p>
      <a href="login.html" class="btn-back" style="margin-top: 28px;">Кіруге оралу</a>
    </div>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').classList.add('active');
    }
  </script>
  
</body>
</html>
