<!DOCTYPE html>
<html lang="kk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satify — Тіркелу</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="mobile.css"/>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #2D2DFF;
      --blue-dark: #1a1aee;
      --text: #0a0a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --white: #ffffff;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: #f7f8ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .auth-card {
      background: var(--white);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 48px rgba(45, 45, 255, .10), 0 2px 12px rgba(0, 0, 0, .04);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .auth-logo img {
      height: 36px;
    }

    .auth-logo-fallback {
      background: var(--blue);
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 7px 18px;
      border-radius: 10px;
      letter-spacing: -.02em;
      display: none;
    }

    .auth-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -.03em;
    }

    .auth-subtitle {
      text-align: center;
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: .9rem;
      color: var(--text);
      background: #fafafa;
      outline: none;
      appearance: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(45, 45, 255, .08);
    }

    input::placeholder {
      color: #b0b3c0;
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 44px;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color .2s;
    }

    .toggle-pw:hover {
      color: var(--blue);
    }

    /* Password strength */
    .pw-strength {
      margin-top: 8px;
    }

    .pw-strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
      margin-bottom: 4px;
    }

    .pw-strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width .3s, background .3s;
    }

    .pw-strength-label {
      font-size: .75rem;
      color: var(--muted);
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: .8125rem;
      color: var(--muted);
      margin: 18px 0;
    }

    .terms input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      padding: 0;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      accent-color: var(--blue);
      margin-top: 1px;
    }

    .terms label {
      font-weight: 400;
      margin: 0;
      cursor: pointer;
    }

    .terms a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .btn-primary:hover {
      background: var(--blue-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45, 45, 255, .25);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: .8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 12px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: .875rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color .2s, box-shadow .2s;
    }

    .btn-google:hover {
      border-color: #d0d0e0;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
    }

    .btn-google svg {
      width: 18px;
      height: 18px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: .875rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    @media(max-width: 480px) {
      .auth-card {
        padding: 32px 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .error {
      color: red;
      font-size: 12px;
      display: block;
      margin-top: 4px;
    }

    input.error-input {
      border-color: red;
    }
  </style>
</head>

<body>
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/satify-footer-logo.png" alt="Satify"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block'" />
      <span class="auth-logo-fallback">Satify</span>
    </div>

    <h1 class="auth-title">Тіркелу</h1>
    <p class="auth-subtitle">Дайындықты бастаңыз — тегін тіркеліңіз</p>

    <form onsubmit="return false">
      <div class="form-row">
        <div class="form-group">
          <label for="firstname">Аты</label>
          <input type="text" id="firstname" placeholder="Азамат" autocomplete="given-name" />
          <small class="error" id="firstnameError"></small>
        </div>
        <div class="form-group">
          <label for="lastname">Тегі</label>
          <input type="text" id="lastname" placeholder="Сейтқали" autocomplete="family-name" />
          <small class="error" id="lastnameError"></small>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Электрондық пошта</label>
        <input type="email" id="email" placeholder="email@example.com" autocomplete="email" />
        <small class="error" id="emailError"></small>
      </div>

      <div class="form-group">
        <label for="grade">Деңгей</label>
        <select id="grade">
          <option value="" disabled selected>Деңгейіңізді таңдаңыз</option>
          <option value="9">9-сынып</option>
          <option value="10">10-сынып</option>
          <option value="11">11-сынып</option>
          <option value="12">12-сынып</option>
          <option value="other">Басқа</option>
        </select>
      </div>

      <div class="form-group">
        <label for="password">Құпия сөз</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Кемінде 8 таңба" autocomplete="new-password"
            oninput="checkStrength(this.value)" />
          <button type="button" class="toggle-pw" onclick="togglePw('password', this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <small class="error" id="passwordError"></small>
        <div class="pw-strength">
          <div class="pw-strength-bar">
            <div class="pw-strength-fill" id="strength-fill"></div>
          </div>
          <span class="pw-strength-label" id="strength-label"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm">Құпия сөзді растау</label>
        <div class="password-wrap">
          <input type="password" id="confirm" placeholder="Құпия сөзді қайталаңыз" autocomplete="new-password" />
          <button type="button" class="toggle-pw" onclick="togglePw('confirm', this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <small class="error" id="confirmError"></small>
      </div>

      <div class="terms">
        <input type="checkbox" id="agree" />
        <label for="agree">
          <a href="#">Пайдалану шарттарымен</a> және <a href="#">Құпиялылық саясатымен</a> келісемін
        </label>
      </div>

      <!-- <a href="profile.html">
        <button class="btn-primary" type="button">Тіркелу</button>
      </a> -->
      <button class="btn-primary" type="button" onclick="handleRegister()">
        Тіркелу
      </button>
    </form>

    <div class="divider">немесе</div>

    <button class="btn-google">
      <svg viewBox="0 0 48 48">
        <path fill="#FFC107"
          d="M43.6 20H24v8h11.3C33.6 33 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z" />
        <path fill="#FF3D00"
          d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z" />
        <path fill="#4CAF50"
          d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.5-3-11.3-7.3l-6.5 5C9.6 39.5 16.3 44 24 44z" />
        <path fill="#1976D2"
          d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.4-4.7 5.8l6.2 5.2C40.5 35.6 44 30.2 44 24c0-1.3-.1-2.7-.4-4z" />
      </svg>
      Google арқылы тіркелу
    </button>

    <div class="auth-footer">
      Аккаунтыңыз бар ма? <a href="login.html">Кіру</a>
    </div>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden
        ? `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17.9 17.9A10.9 10.9 0 0 1 12 20C5 20 1 12 1 12a18.5 18.5 0 0 1 5.1-6.9M9.9 4.2A9.8 9.8 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.2 3.2M1 1l22 22"/><path d="M10.7 10.7a3 3 0 1 0 4.2 4.2"/></svg>`
        : `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    function checkStrength(val) {
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      if (!val) { fill.style.width = '0'; label.textContent = ''; return; }
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { pct: '25%', color: '#ef4444', text: 'Өте әлсіз' },
        { pct: '50%', color: '#f97316', text: 'Әлсіз' },
        { pct: '75%', color: '#eab308', text: 'Орташа' },
        { pct: '100%', color: '#22c55e', text: 'Күшті' },
      ];
      const lvl = levels[score - 1] || levels[0];
      fill.style.width = lvl.pct;
      fill.style.background = lvl.color;
      label.textContent = lvl.text;
      label.style.color = lvl.color;
    }

    //VALIDATION FORM 
    function validateForm() {
      let isValid = true;

      // очищаем ошибки
      document.querySelectorAll(".error").forEach(e => e.innerText = "");
      document.querySelectorAll("input").forEach(i => i.classList.remove("error-input"));

      const firstname = document.getElementById("firstname");
      const lastname = document.getElementById("lastname");
      const email = document.getElementById("email");
      const password = document.getElementById("password");
      const confirm = document.getElementById("confirm");

      // Firstname
      if (!firstname.value.trim()) {
        setError(firstname, "firstnameError", "Введите имя");
        isValid = false;
      }

      // Lastname
      if (!lastname.value.trim()) {
        setError(lastname, "lastnameError", "Введите фамилию");
        isValid = false;
      }

      // Email
      if (!email.value.trim()) {
        setError(email, "emailError", "Введите email");
        isValid = false;
      } else if (!validateEmail(email.value)) {
        setError(email, "emailError", "Некорректный email");
        isValid = false;
      }

      // Password
      if (password.value.length < 6) {
        setError(password, "passwordError", "Минимум 6 символов");
        isValid = false;
      }

      // Confirm password
      if (password.value !== confirm.value) {
        setError(confirm, "confirmError", "Пароли не совпадают");
        isValid = false;
      }

      return isValid;
    }

    function setError(input, errorId, message) {
      input.classList.add("error-input");
      document.getElementById(errorId).innerText = message;
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    //REGISTRATION FUNCTION
    async function handleRegister() {

      if (!validateForm()) return;

      const firstname = document.getElementById('firstname').value;
      const lastname = document.getElementById('lastname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch("http://localhost:8080/api/v1/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            firstname,
            lastname,
            email,
            password
          })
        });

        const data = await res.json();

        if (!res.ok) {
          alert("Ошибка регистрации");
          return;
        }

        // saving token
        localStorage.setItem("token", data.token);

        // redirect
        window.location.href = "profile.html";

      } catch (e) {
        console.error(e);
      }
    }
  </script>
</body>

</html>
